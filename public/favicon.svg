<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Colorful Isometric Pallet Icon -->
  <g transform="translate(16, 13)">
    <!-- Top diamond face - Warm Wood Color -->
    <path d="M0 14 L14 7 L0 0 L-14 7 Z" fill="#d97706"/>
    
    <!-- Side thickness - Darker Wood/Shadow -->
    <path d="M-14 7 L-14 9.5 L0 16.5 L0 14 Z" fill="#92400e"/>
    <path d="M14 7 L14 9.5 L0 16.5 L0 14 Z" fill="#78350f"/>
    
    <!-- Decorative board lines - Subtle Contrast -->
    <path d="M-10 5 L4 12" stroke="#b45309" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
    <path d="M-6 3 L8 10" stroke="#b45309" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
    <path d="M-2 1 L12 8" stroke="#b45309" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  </g>
</svg>